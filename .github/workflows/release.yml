name: Release

# Build a signed APK and attach it to a GitHub Release whenever a vX.Y tag is pushed.
# The in-app updater (UpdateRepository) reads /releases/latest and downloads the .apk asset.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the release and upload the APK asset

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/DavesGovee-${GITHUB_REF_NAME}.apk"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DavesGovee-${{ github.ref_name }}.apk
          generate_release_notes: true
